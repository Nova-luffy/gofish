<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiplayer Go Fish Variant</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; margin: 20px; }
        .hidden { display: none; }
        #game-board { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; margin-top: 20px; }
        .opponents { display: flex; gap: 15px; margin-bottom: 20px; }
        .player-card { border: 2px solid #7f8c8d; padding: 10px; background: #34495e; border-radius: 5px; }
        .active-turn { border-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .hand-container { background: #1abc9c; padding: 15px; border-radius: 5px; min-height: 80px; margin-top: 20px; }
        .card { width: 50px; display: inline-block; background: white; color: black; padding: 10px; text-align: center; border-radius: 5px; margin-right: 5px; font-weight: bold; }
        .log-box { background: #000; padding: 10px; height: 300px; overflow-y: scroll; font-family: monospace; }
        .controls { margin-top: 15px; padding: 10px; background: #34495e; }
    </style>
</head>
<body>

    <h1>Go Fish Multi-Slayer (4-6 Players)</h1>

    <div id="lobby">
        <input type="text" id="username" placeholder="Enter Nickname">
        <button onclick="joinGame()">Join Lobby</button>
        <h3>Players connected:</h3>
        <ul id="player-list"></ul>
        <button id="start-btn" class="hidden" onclick="startGame()">Start Game</button>
    </div>

    <div id="game-container" class="hidden">
        <div id="game-board">
            <div>
                <h3>Opponents</h3>
                <div class="opponents" id="opponents-list"></div>

                <div class="controls" id="action-controls">
                    <h3>Your Turn Actions</h3>
                    <label>Target Player: </label><select id="target-player-select"></select>
                    <label>Rank: </label><select id="target-rank-select"></select>
                    <button onclick="submitAsk()">Ask For Card</button>
                    <hr>
                    <button onclick="drawFromDeck()">Draw from Deck instead</button>
                </div>

                <h3>Your Hand</h3>
                <div class="hand-container" id="my-hand"></div>
            </div>

            <div>
                <h3>Game Log (<span id="deck-count">52</span> left)</h3>
                <div class="log-box" id="log-feed"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
